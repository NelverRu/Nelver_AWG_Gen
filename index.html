<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AmneziaWG Config Generator</title>  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
            color: #6ad500;
            font-weight: bold;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #FF0000;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .country-selector {
            margin: 25px 0;
            text-align: center;
        }

        .country-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .country-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #6ad500;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1rem;
            min-width: 140px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(255, 255, 255, 0.1) inset;
        }

        .country-btn:hover {
            background: linear-gradient(145deg, #353535, #252525);
            border-bottom: 2px solid rgba(106, 213, 0, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.7), 0 2px 8px rgba(106, 213, 0, 0.3) inset;
        }

        .country-btn.active {
            background: linear-gradient(145deg, #2a3a1a, #1a2a0a);
            border: 1px solid rgba(106, 213, 0, 0.5);
            border-bottom: 3px solid #6ad500;
            color: #e0e0e0;
            box-shadow: 0 8px 20px rgba(106, 213, 0, 0.3), 0 2px 5px rgba(255, 255, 255, 0.2) inset;
            transform: translateY(-2px);
        }

        .template-section {
            margin: 25px 0;
        }

        .file-label {
            display: block;
            margin-bottom: 10px;
            color: #667eea;
            font-weight: bold;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-weight: bold;
            color: #e0e0e0;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 15px;
        }

        #configTemplate {
            height: 420px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn, .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #6ad500;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1.1rem;
            min-width: 200px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(255, 255, 255, 0.1) inset;
            text-decoration: none;
        }

        .action-btn:hover, .download-link:hover {
            background: linear-gradient(145deg, #353535, #252525);
            border-bottom: 2px solid rgba(106, 213, 0, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.6), 0 2px 8px rgba(106, 213, 0, 0.3) inset;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 20px;
        }

        #resultConfig {
            height: 600px;
            background: rgba(0,0,0,0.3);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #6ad500;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #6ad500;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 14px 20px;
            color: white;
            text-align: center;
            z-index: 9999;
            font-size: 14px;
            animation: fadeInUp 0.3s ease;
            max-width: 500px;
            margin: 0 auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .country-btn { min-width: 130px; padding: 10px 20px; font-size: 0.95rem; }
            .action-btn, .download-link { min-width: 180px; padding: 12px 24px; font-size: 1rem; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .country-btn { min-width: 120px; padding: 8px 16px; font-size: 0.9rem; }
            #configTemplate { height: 350px; }
            #resultConfig { height: 400px; }
            .action-btn, .download-link { min-width: 160px; padding: 10px 20px; font-size: 0.95rem; }
        }

        @media (max-width: 600px) {
            .country-btn { min-width: calc(50% - 8px); flex: 1 1 auto; }
            .action-buttons { flex-direction: column; align-items: center; }
            .action-btn, .download-link { min-width: 100%; width: 100%; padding: 14px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .container { padding: 15px; }
            .country-btn { min-width: 100%; padding: 14px; }
            #configTemplate { height: 300px; }
            #resultConfig { height: 350px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Генератор конфигураций для AmneziaWG ⚡</h1>
        <p class="subtitle">Клиент должен поддерживать протокол AmneziaWG 1.5 или выше!!!</p>
        
        <div class="country-selector">
            <div class="country-row">
                <button class="country-btn" data-type="standard" data-endpoint="engage.cloudflareclient.com:2408" data-server-name="WARP">🇷🇺 Cloudflare WARP</button>
                <button class="country-btn" data-type="fr" data-endpoint="147.135.212.152:5242" data-server-name="FR">🇫🇷 Roubaix, FR</button>
                <button class="country-btn" data-type="pl" data-endpoint="51.38.153.32:5242" data-server-name="PL">🇵🇱 Warsaw, PL</button>
                <button class="country-btn" data-type="de" data-endpoint="51.38.107.252:5242" data-server-name="DE">🇩🇪 Frankfurt, DE</button>
            </div>
        </div>

        <div class="template-section">
            <label class="file-label">📝 Шаблон конфигурации (можно редактировать):</label>
            <textarea id="configTemplate">
[Interface]
PrivateKey = {{PrivateKey}}
Address = {{Address}}
DNS = 1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001	
MTU = 1280
S1 = 0
S2 = 0
Jc = 4
Jmin = 40
Jmax = 70
H1 = 1
H2 = 2
H3 = 3
H4 = 4
I1 = {{I1}}
I2 = {{I2}}
I3 = {{I3}}
I4 = {{I4}}
I5 = {{I5}}
[Peer]
PublicKey = {{PublicKey}}
AllowedIPs = 0.0.0.0/0, ::/0
PersistentKeepalive = 25				
Endpoint = {{Endpoint}}</textarea>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="generateBtn">🎲 Сгенерировать конфигурацию</button>
            <button class="action-btn" id="copyResultBtn">📋 Копировать</button>
            <a href="#" id="downloadLink" class="download-link" style="display: none;">⬇️ Скачать</a>
        </div>

        <div class="result-section">
            <label class="file-label">✅ Сгенерированная конфигурация (предпросмотр):</label>
            <textarea id="resultConfig" readonly style="height:600px; background: rgba(0,0,0,0.3);"></textarea>
        </div>

        <div class="footer">
            <p>⚡ Конфигурации генерируются через официальное API Cloudflare WARP</p>
        </div>
    </div>

    <script>
        // ========== СТАТИЧНЫЕ ЗНАЧЕНИЯ I1-I5 ==========
        const STATIC_VALUES = {
            I1: "<b 0x5245474953544552207369703a676f6f676c652e636f6d205349502f322e300d0a5669613a205349502f322e302f554450203139322e3136382e322e34343a353036303b6272616e63683d7a39684734624b3861653037633839613539393664383765663066613865660d0a4d61782d466f7277617264733a2037300d0a546f3a203c7369703a7573657240676f6f676c652e636f6d3e0d0a46726f6d3a203c7369703a7573657240676f6f676c652e636f6d3e3b7461673d663834326539346239393464366365310d0a43616c6c2d49443a2065323633356164653733356633356536396334663732363938643162613665630d0a435365713a20312052454749535445520d0a436f6e746163743a203c7369703a75736572403139322e3136382e3134332e31323a353036303e0d0a557365722d4167656e743a205a657068797220322e302e300d0a457870697265733a20343833340d0a436f6e74656e742d4c656e6774683a20300d0a0d0a>",
            I2: "<b 0x160303005e0100005a030371c980e3bcb0bc9197e00a73e45913e5b24b7a5207411b4e3a9138ff7da55a5d000002c02b0100002f0000001400001200000f6d61696c2e676f6f676c652e636f6d000b000403000102000a000a0008e0a73a6222c0e2f4>",
            I3: "<b 0x16030300300200002c0303646acaf7f51bcdd0ac7f8d9ac66760a7b7348b64a07671e2b1f74cfa7b6f9b48045787778c1301000000>",
            I4: "<b 0x100000807787ac4126988cacfafdd85a8c791aecdb0d32fe00880ebc2f5cda27314711bd6961f9eb947ca1462c9e5ffc5d8977bbb29c6fe48f4be710d109e494a3f7f7788d66f05946a3d59d613b8b24c62223f90b58afa467153883dda852137e99bb334e0085a9b05c4cc0945a2d0cc854c88e7422665b594489ab3c3114dbee57a7e214030300010116030300347e800937a84d4d6b68f7d89a65605a16a573cb3d470e0cccca0b17e328951c8209809ff5135c3e32a1493c5a81139612c7086118>",
            I5: "<b 0x170303015b474554202f20485454502f312e310d0a486f73743a20646f63732e676f6f676c652e636f6d0d0a557365722d4167656e743a204d6f7a696c6c612f352e30202857696e646f7773204e542031302e303b2057696e36343b2078363429204170706c655765624b69742f3533372e333620284b48544d4c2c206c696b65204765636b6f29204368726f6d652f39312e302e343437322e313234205361666172692f3533372e33360d0a4163636570743a20746578742f68746d6c2c6170706c69636174696f6e2f7868746d6c2b786d6c2c6170706c69636174696f6e2f786d6c3b713d302e392c696d6167652f776562702c2a2f2a3b713d302e380d0a4163636570742d4c616e67756167653a20656e2d55532c656e3b713d302e350d0a4163636570742d456e636f64696e673a20677a69702c206465666c6174652c2062720d0a436f6e6e656374696f6e3a206b6565702d616c6976650d0a0d0a>"
        };

        // ========== ПЕРЕМЕННЫЕ ==========
        let currentEndpoint = 'engage.cloudflareclient.com:2408';
        let currentType = 'standard';
        let currentServerName = 'WARP';

        // Элементы DOM
        const generateBtn = document.getElementById('generateBtn');
        const copyResultBtn = document.getElementById('copyResultBtn');
        const downloadLink = document.getElementById('downloadLink');
        const configTemplate = document.getElementById('configTemplate');
        const resultConfig = document.getElementById('resultConfig');
        const countryButtons = document.querySelectorAll('.country-btn');

        function showError(message) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = `❌ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function getMoscowTimeString() {
            const now = new Date();
            const moscowTime = new Date(now.getTime() + (3 * 60 * 60 * 1000));
            const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
            const seconds = String(moscowTime.getUTCSeconds()).padStart(2, '0');
            return `${hours}_${minutes}_${seconds}`;
        }

        function getFileName(serverName) {
            const timeStr = getMoscowTimeString();
            return `AWG_${serverName}_${timeStr}.conf`;
        }

        function fillTemplateWithStaticValues(configContent, endpoint) {
            // Парсим полученную конфигурацию
            let privateKey = '', publicKey = '', address = '';
            const lines = configContent.split('\n');
            
            for (const line of lines) {
                if (line.startsWith('PrivateKey = ')) {
                    privateKey = line.substring('PrivateKey = '.length).trim();
                } else if (line.startsWith('PublicKey = ')) {
                    publicKey = line.substring('PublicKey = '.length).trim();
                } else if (line.startsWith('Address = ')) {
                    address = line.substring('Address = '.length).trim();
                }
            }
            
            // Заполняем шаблон
            let template = configTemplate.value;
            template = template.replace('{{PrivateKey}}', privateKey);
            template = template.replace('{{Address}}', address);
            template = template.replace('{{PublicKey}}', publicKey);
            template = template.replace('{{Endpoint}}', endpoint);
            template = template.replace('{{I1}}', STATIC_VALUES.I1);
            template = template.replace('{{I2}}', STATIC_VALUES.I2);
            template = template.replace('{{I3}}', STATIC_VALUES.I3);
            template = template.replace('{{I4}}', STATIC_VALUES.I4);
            template = template.replace('{{I5}}', STATIC_VALUES.I5);
            
            return template;
        }

        function updateTemplateEndpoint(endpoint) {
            const lines = configTemplate.value.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('Endpoint =')) {
                    lines[i] = `Endpoint = ${endpoint}`;
                    break;
                }
            }
            configTemplate.value = lines.join('\n');
        }

        // Обработчики кнопок выбора сервера
        countryButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                countryButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentType = this.dataset.type;
                currentEndpoint = this.dataset.endpoint;
                currentServerName = this.dataset.serverName;
                
                updateTemplateEndpoint(currentEndpoint);
            });
        });

        // Генерация конфигурации через API (как в 2.html)
        async function generateConfig() {
            generateBtn.disabled = true;
            const originalText = generateBtn.innerHTML;
            generateBtn.innerHTML = '<span class="loading-spinner"></span> Генерация...';
            
            try {
                const response = await fetch('/api/warp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: currentType })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success && data.content) {
                    const configContent = atob(data.content);
                    const finalConfig = fillTemplateWithStaticValues(configContent, currentEndpoint);
                    
                    resultConfig.value = finalConfig;
                    
                    // Создаем ссылку для скачивания
                    const blob = new Blob([finalConfig], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    downloadLink.href = url;
                    downloadLink.download = getFileName(currentServerName);
                    downloadLink.style.display = 'inline-flex';
                    
                    generateBtn.innerHTML = '✅ Готово!';
                    setTimeout(() => {
                        generateBtn.innerHTML = originalText;
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Ошибка генерации конфигурации');
                }
            } catch (error) {
                console.error('Generation error:', error);
                showError(error.message || 'Ошибка при генерации. Проверьте соединение с сервером.');
                generateBtn.innerHTML = '❌ Ошибка';
                setTimeout(() => {
                    generateBtn.innerHTML = originalText;
                }, 2500);
            } finally {
                generateBtn.disabled = false;
            }
        }

        // Копирование в буфер
        copyResultBtn.addEventListener('click', function() {
            if (resultConfig.value) {
                navigator.clipboard.writeText(resultConfig.value).then(() => {
                    const originalText = copyResultBtn.textContent;
                    copyResultBtn.textContent = '✅ Скопировано!';
                    setTimeout(() => {
                        copyResultBtn.textContent = originalText;
                    }, 2000);
                }).catch(() => {
                    showError('Не удалось скопировать');
                });
            } else {
                showError('Сначала сгенерируйте конфиг');
            }
        });

        generateBtn.addEventListener('click', generateConfig);

        // Инициализация
        const defaultBtn = document.querySelector('.country-btn[data-type="standard"]');
        if (defaultBtn) {
            defaultBtn.classList.add('active');
            currentType = defaultBtn.dataset.type;
            currentEndpoint = defaultBtn.dataset.endpoint;
            currentServerName = defaultBtn.dataset.serverName;
            updateTemplateEndpoint(currentEndpoint);
        }
    </script>
</body>
</html>
