<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AmneziaWG Config Generator</title>  
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
            color: #6ad500;
            font-weight: bold;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #FF0000;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .country-selector {
            margin: 25px 0;
            text-align: center;
        }

        .country-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .country-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #6ad500;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1rem;
            min-width: 140px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(255, 255, 255, 0.1) inset;
        }

        .country-btn:hover {
            background: linear-gradient(145deg, #353535, #252525);
            border-bottom: 2px solid rgba(106, 213, 0, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.7), 0 2px 8px rgba(106, 213, 0, 0.3) inset;
        }

        .country-btn.active {
            background: linear-gradient(145deg, #2a3a1a, #1a2a0a);
            border: 1px solid rgba(106, 213, 0, 0.5);
            border-bottom: 3px solid #6ad500;
            color: #e0e0e0;
            box-shadow: 0 8px 20px rgba(106, 213, 0, 0.3), 0 2px 5px rgba(255, 255, 255, 0.2) inset;
            transform: translateY(-2px);
        }

        .template-section {
            margin: 25px 0;
        }

        .file-label {
            display: block;
            margin-bottom: 10px;
            color: #667eea;
            font-weight: bold;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-weight: bold;
            color: #e0e0e0;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
            margin-bottom: 15px;
        }

        #configTemplate {
            height: 420px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn, .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #6ad500;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1.1rem;
            min-width: 200px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5), 0 2px 5px rgba(255, 255, 255, 0.1) inset;
            text-decoration: none;
        }

        .action-btn:hover, .download-link:hover {
            background: linear-gradient(145deg, #353535, #252525);
            border-bottom: 2px solid rgba(106, 213, 0, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.6), 0 2px 8px rgba(106, 213, 0, 0.3) inset;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            margin-top: 20px;
        }

        #resultConfig {
            height: 600px;
            background: rgba(0,0,0,0.3);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #6ad500;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #6ad500;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(255, 50, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 14px 20px;
            color: white;
            text-align: center;
            z-index: 9999;
            font-size: 14px;
            animation: fadeInUp 0.3s ease;
            max-width: 500px;
            margin: 0 auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .country-btn { min-width: 130px; padding: 10px 20px; font-size: 0.95rem; }
            .action-btn, .download-link { min-width: 180px; padding: 12px 24px; font-size: 1rem; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .country-btn { min-width: 120px; padding: 8px 16px; font-size: 0.9rem; }
            #configTemplate { height: 350px; }
            #resultConfig { height: 400px; }
            .action-btn, .download-link { min-width: 160px; padding: 10px 20px; font-size: 0.95rem; }
        }

        @media (max-width: 600px) {
            .country-btn { min-width: calc(50% - 8px); flex: 1 1 auto; }
            .action-buttons { flex-direction: column; align-items: center; }
            .action-btn, .download-link { min-width: 100%; width: 100%; padding: 14px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .container { padding: 15px; }
            .country-btn { min-width: 100%; padding: 14px; }
            #configTemplate { height: 300px; }
            #resultConfig { height: 350px; }
        }
    </style>

		// ========== СБОР ВСЕХ ПАКЕТОВ ПО ТИПАМ ==========
        const allPackets = { I1: [], I2: [], I3: [], I4: [], I5: [] };

        // Сортируем встроенные пакеты по типам
        for (const [key, value] of Object.entries(STATIC_VALUES)) {
        if (key.startsWith('I1_')) allPackets.I1.push(value);
        else if (key.startsWith('I2_')) allPackets.I2.push(value);
        else if (key.startsWith('I3_')) allPackets.I3.push(value);
        else if (key.startsWith('I4_')) allPackets.I4.push(value);
        else if (key.startsWith('I5_')) allPackets.I5.push(value);
        }

        // Функция получения случайного пакета для указанного типа
        function getRandomPacket(type) {
        const packets = allPackets[type];
        if (!packets || packets.length === 0) return '';
        return packets[Math.floor(Math.random() * packets.length)];
        }
		
        let currentEndpoint = 'engage.cloudflareclient.com:2408';
        let currentType = 'standard';
        let currentServerName = 'WARP';

        const generateBtn = document.getElementById('generateBtn');
        const copyResultBtn = document.getElementById('copyResultBtn');
        const downloadLink = document.getElementById('downloadLink');
        const configTemplate = document.getElementById('configTemplate');
        const resultConfig = document.getElementById('resultConfig');
        const countryButtons = document.querySelectorAll('.country-btn');

        function showError(message) {
            const toast = document.createElement('div');
            toast.className = 'error-toast';
            toast.textContent = `❌ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        
		function getMoscowTimeString() {
            const now = new Date();
            const moscowTime = new Date(now.getTime() + (3 * 60 * 60 * 1000));
            const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
            const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
            return `${hours}_${minutes}`;
        }

        function getFileName(serverName) {
            const timeStr = getMoscowTimeString();
            return `AWG_${serverName}_${timeStr}.conf`;
        }

        function fillTemplateWithStaticValues(configContent, endpoint) {
        let privateKey = '', publicKey = '', address = '';
        const lines = configContent.split('\n');
    
        for (const line of lines) {
        if (line.startsWith('PrivateKey = ')) {
            privateKey = line.substring('PrivateKey = '.length).trim();
        } else if (line.startsWith('PublicKey = ')) {
            publicKey = line.substring('PublicKey = '.length).trim();
        } else if (line.startsWith('Address = ')) {
            address = line.substring('Address = '.length).trim();
        }
    }
    
    let template = configTemplate.value;
    template = template.replace('{{PrivateKey}}', privateKey);
    template = template.replace('{{Address}}', address);
    template = template.replace('{{PublicKey}}', publicKey);
    template = template.replace('{{Endpoint}}', endpoint);
    
    // Выбираем случайные пакеты из 200 вариантов для каждого I1-I5
    template = template.replace('{{I1}}', getRandomPacket('I1'));
    template = template.replace('{{I2}}', getRandomPacket('I2'));
    template = template.replace('{{I3}}', getRandomPacket('I3'));
    template = template.replace('{{I4}}', getRandomPacket('I4'));
    template = template.replace('{{I5}}', getRandomPacket('I5'));
    
    return template;
}

        function updateTemplateEndpoint(endpoint) {
            const lines = configTemplate.value.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('Endpoint =')) {
                    lines[i] = `Endpoint = ${endpoint}`;
                    break;
                }
            }
            configTemplate.value = lines.join('\n');
        }

        countryButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                countryButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                currentType = this.dataset.type;
                currentEndpoint = this.dataset.endpoint;
                currentServerName = this.dataset.serverName;
                
                updateTemplateEndpoint(currentEndpoint);
            });
        });

        async function generateConfig() {
            generateBtn.disabled = true;
            const originalText = generateBtn.innerHTML;
            generateBtn.innerHTML = '<span class="loading-spinner"></span> Генерация...';
            
            try {
                const response = await fetch('/api/warp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: currentType })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success && data.content) {
                    const configContent = atob(data.content);
                    const finalConfig = fillTemplateWithStaticValues(configContent, currentEndpoint);
                    
                    resultConfig.value = finalConfig;
                    
                    const blob = new Blob([finalConfig], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    downloadLink.href = url;
                    downloadLink.download = getFileName(currentServerName);
                    downloadLink.style.display = 'inline-flex';
                    
                    generateBtn.innerHTML = '✅ Готово!';
                    setTimeout(() => {
                        generateBtn.innerHTML = originalText;
                    }, 2000);
                } else {
                    throw new Error(data.message || 'Ошибка генерации конфигурации');
                }
            } catch (error) {
                console.error('Generation error:', error);
                showError(error.message || 'Ошибка при генерации. Проверьте соединение с сервером.');
                generateBtn.innerHTML = '❌ Ошибка';
                setTimeout(() => {
                    generateBtn.innerHTML = originalText;
                }, 2500);
            } finally {
                generateBtn.disabled = false;
            }
        }

        copyResultBtn.addEventListener('click', function() {
            if (resultConfig.value) {
                navigator.clipboard.writeText(resultConfig.value).then(() => {
                    const originalText = copyResultBtn.textContent;
                    copyResultBtn.textContent = '✅ Скопировано!';
                    setTimeout(() => {
                        copyResultBtn.textContent = originalText;
                    }, 2000);
                }).catch(() => {
                    showError('Не удалось скопировать');
                });
            } else {
                showError('Сначала сгенерируйте конфиг');
            }
        });

        generateBtn.addEventListener('click', generateConfig);

        const defaultBtn = document.querySelector('.country-btn[data-type="standard"]');
        if (defaultBtn) {
            defaultBtn.classList.add('active');
            currentType = defaultBtn.dataset.type;
            currentEndpoint = defaultBtn.dataset.endpoint;
            currentServerName = defaultBtn.dataset.serverName;
            updateTemplateEndpoint(currentEndpoint);
        }
    </script>
